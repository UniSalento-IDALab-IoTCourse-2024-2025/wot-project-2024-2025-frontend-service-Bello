version: '3.8'

services:
  react-app:
    build: .
    container_name: react-app
    ports:
      - "5173:5173"  # Mappa la porta 5173 del container sulla porta 5173 della macchina host
    volumes:
      - .:/app  # Assicura che le modifiche nel codice sorgente siano riflettute senza bisogno di ricostruire
    environment:
      - CHOKIDAR_USEPOLLING=true  # Utile se hai problemi con la rilevazione delle modifiche sui file
